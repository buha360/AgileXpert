databaseChangeLog:
  - changeSet:
      id: 003-seed-default-group
      author: milan
      changes:
        - insert:
            tableName: user_group
            columns:
              - column:
                  name: id
                  value: group-buha-family
              - column:
                  name: name
                  value: Buha Family
              - column:
                  name: access_code
                  value: asd

        - insert:
            tableName: menu
            columns:
              - column:
                  name: id
                  value: menu-buha-admin-root
              - column:
                  name: name
                  value: Buha fömenüje

        - insert:
            tableName: user_account
            columns:
              - column:
                  name: id
                  value: user-buha-admin
              - column:
                  name: name
                  value: Buha
              - column:
                  name: user_password
                  value: asd
              - column:
                  name: role
                  value: ADMIN
              - column:
                  name: group_id
                  value: group-buha-family
              - column:
                  name: root_menu_id
                  value: menu-buha-admin-root
              - column:
                  name: wallpaper_id
                  value: wallpaper-mountain
              - column:
                  name: theme_id
                  value: theme-dark

        - insert:
            tableName: menu_item
            columns:
              - column:
                  name: id
                  value: menu-item-buha-openmap
              - column:
                  name: name
                  value: OpenMap
              - column:
                  name: position_index
                  valueNumeric: 1
              - column:
                  name: menu_id
                  value: menu-buha-admin-root
              - column:
                  name: application_id
                  value: app-openmap

        - insert:
            tableName: menu_item
            columns:
              - column:
                  name: id
                  value: menu-item-buha-paint
              - column:
                  name: name
                  value: Paint
              - column:
                  name: position_index
                  valueNumeric: 2
              - column:
                  name: menu_id
                  value: menu-buha-admin-root
              - column:
                  name: application_id
                  value: app-paint