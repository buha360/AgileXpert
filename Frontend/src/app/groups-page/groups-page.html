<div class="page">
  <h1>Groups</h1>

  <section class="card">
    <h2>Create Group</h2>

    <div class="form-grid">
      <input [(ngModel)]="createRequest.groupName" placeholder="Group name" />
      <input [(ngModel)]="createRequest.accessCode" placeholder="Access code" />
      <input [(ngModel)]="createRequest.adminUserName" placeholder="Admin username" />
      <input [(ngModel)]="createRequest.adminPassword" placeholder="Admin password" type="password" />
    </div>

    <button (click)="createGroup()">Create group</button>
  </section>

  <section class="card">
    <h2>Available Groups</h2>

    <div *ngIf="loading">Loading...</div>
    <div *ngIf="errorMessage">{{ errorMessage }}</div>

    <ul *ngIf="!loading && groups.length > 0" class="group-list">
      <li *ngFor="let group of groups" class="group-item">
        <div>
          <strong>{{ group.name }}</strong> — {{ group.id }}
        </div>
        <button (click)="selectGroupForEntry(group.id!)">Enter</button>
      </li>
    </ul>

    <div *ngIf="!loading && groups.length === 0">
      No groups found.
    </div>
  </section>

  <section class="card" *ngIf="selectedGroupId">
    <h2>Enter Group</h2>

    <div><strong>Selected group ID:</strong> {{ selectedGroupId }}</div>

    <div class="form-grid">
      <input [(ngModel)]="accessCode" placeholder="Enter access code" type="password" />
    </div>

    <div *ngIf="accessErrorMessage" class="error-message">
      {{ accessErrorMessage }}
    </div>

    <div class="button-row">
      <button (click)="enterGroup()">Continue</button>
      <button (click)="cancelEntry()">Cancel</button>
    </div>
  </section>
</div>
